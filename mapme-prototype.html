<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>mapme · Bản đồ làng nghề Việt Nam (Prototype)</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<style>
  :root{
    --bg:#0a0a0b;
    --bg-elev:#131315;
    --bg-elev-2:#1b1b1f;
    --border:#26262b;
    --text:#f3f2ef;
    --text-dim:#a2a0a6;
    --text-mute:#6b6a71;
    --accent:#b894ff;
    --accent-2:#7c5cff;
    --food:#e39a4b;
    --bamboo:#7fb069;
    --textile:#d46a9d;
    --metal:#6aa7c2;
    --wood:#a37358;
    --ceramic:#c7704e;
    --paper:#5ec1c0;
    --other:#8a8790;
    --active:#7fb069;
    --recognized:#b894ff;
    --revival:#e39a4b;
    --declining:#e06b6b;
    --ring:rgba(184,148,255,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Inter","SF Pro Text","Segoe UI",system-ui,sans-serif;
    font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none}
  button{font-family:inherit;cursor:pointer}

  /* header */
  header{
    display:flex;align-items:center;gap:16px;padding:12px 20px;
    border-bottom:1px solid var(--border);background:var(--bg);
    position:sticky;top:0;z-index:500;
  }
  .logo{display:flex;align-items:center;gap:8px;font-weight:600;letter-spacing:-.01em}
  .logo .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 14px var(--accent)}
  .logo em{color:var(--accent);font-style:normal}
  .hdr-divider{width:1px;height:22px;background:var(--border)}
  .phase{font-size:11px;color:var(--text-mute);padding:3px 8px;border:1px solid var(--border);border-radius:999px;letter-spacing:.02em}
  .persona-switcher{display:flex;gap:4px;background:var(--bg-elev);border:1px solid var(--border);border-radius:999px;padding:3px;margin-left:auto}
  .persona-btn{background:transparent;border:0;color:var(--text-dim);padding:6px 12px;border-radius:999px;font-size:12.5px;white-space:nowrap}
  .persona-btn[aria-pressed="true"]{background:var(--accent);color:#0a0a0b;font-weight:600}
  .persona-btn:hover:not([aria-pressed="true"]){color:var(--text)}

  /* layout */
  main{display:grid;grid-template-columns:340px 1fr 0px;height:calc(100vh - 57px);transition:grid-template-columns .25s ease}
  main.detail-open{grid-template-columns:340px 1fr 400px}

  /* sidebar */
  aside.sidebar{border-right:1px solid var(--border);overflow-y:auto;padding:16px;background:var(--bg)}
  .persona-note{font-size:12px;color:var(--text-dim);padding:10px 12px;background:var(--bg-elev);border:1px solid var(--border);border-radius:10px;margin-bottom:16px;line-height:1.5}
  .persona-note strong{color:var(--text)}

  .search{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--bg-elev);border:1px solid var(--border);border-radius:10px;margin-bottom:14px}
  .search input{background:transparent;border:0;color:var(--text);flex:1;outline:0;font-size:13.5px}
  .search input::placeholder{color:var(--text-mute)}
  .search svg{color:var(--text-mute);flex-shrink:0}

  .section-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-mute);margin:18px 0 8px}

  .filter-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
  .chip{background:var(--bg-elev);border:1px solid var(--border);color:var(--text-dim);padding:6px 10px;border-radius:999px;font-size:12px;display:inline-flex;align-items:center;gap:6px}
  .chip .dot{width:8px;height:8px;border-radius:50%}
  .chip[aria-pressed="true"]{background:var(--bg-elev-2);border-color:#3a3a40;color:var(--text)}
  .chip.all[aria-pressed="true"]{background:var(--accent);color:#0a0a0b;border-color:var(--accent)}

  select.province{width:100%;background:var(--bg-elev);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:10px;font-size:13px}

  .stat-row{display:flex;justify-content:space-between;font-size:12.5px;color:var(--text-dim);margin:14px 0 6px}
  .stat-row strong{color:var(--text)}

  /* featured artisan card */
  .featured{margin-top:18px;border:1px solid var(--border);border-radius:14px;overflow:hidden;background:var(--bg-elev)}
  .featured .meta{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);padding:12px 14px 0}
  .featured .hero{margin:10px 0 0;aspect-ratio:16/10;background:
    linear-gradient(135deg,#3d2a1f 0%,#5c3e2b 30%,#8a5a3c 70%,#c09574 100%);
    position:relative;overflow:hidden;display:flex;align-items:flex-end}
  .featured .hero::after{content:"";position:absolute;inset:0;background:
    radial-gradient(circle at 30% 40%,rgba(255,240,210,.25) 0,transparent 40%),
    radial-gradient(circle at 80% 70%,rgba(0,0,0,.35) 0,transparent 50%)}
  .featured .hero .label{position:relative;padding:12px 14px;font-size:10.5px;color:#e8dbc9;text-shadow:0 1px 2px rgba(0,0,0,.5);letter-spacing:.02em}
  .featured .body{padding:12px 14px 14px}
  .featured h3{margin:0 0 4px;font-size:15px;letter-spacing:-.01em}
  .featured p{margin:0;font-size:12.5px;color:var(--text-dim)}
  .featured .jump{display:inline-block;margin-top:10px;font-size:12px;color:var(--accent);cursor:pointer}
  .featured .jump:hover{text-decoration:underline}

  /* hung big buttons */
  .hung-actions{display:grid;gap:10px;margin-top:8px}
  .hung-btn{display:flex;align-items:center;gap:14px;padding:18px 16px;background:var(--bg-elev);border:1px solid var(--border);border-radius:14px;color:var(--text);font-size:16px;text-align:left}
  .hung-btn .ico{width:38px;height:38px;border-radius:10px;background:var(--bg-elev-2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
  .hung-btn small{display:block;color:var(--text-mute);font-size:12px;margin-top:2px;font-weight:400}
  .hung-btn strong{font-weight:500;letter-spacing:-.005em}

  /* linh project card */
  .project-card{background:linear-gradient(135deg,#1f1b2e 0%,#2a2240 100%);border:1px solid #3a2f55;border-radius:12px;padding:14px;margin-bottom:14px}
  .project-card .label{font-size:10.5px;color:#b894ff;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
  .project-card h4{margin:0 0 6px;font-size:14px}
  .project-card p{margin:0;font-size:12px;color:var(--text-dim);line-height:1.5}

  /* thao stats grid */
  .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
  .stat-card{background:var(--bg-elev);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
  .stat-card .v{font-size:22px;font-weight:500;letter-spacing:-.02em;line-height:1.1}
  .stat-card .k{font-size:11px;color:var(--text-mute);margin-top:2px}
  .stat-card.alert{border-color:#5a3a3a}
  .stat-card.alert .v{color:#e06b6b}

  /* map area */
  .map-area{position:relative;background:#0e0e10}
  #map{position:absolute;inset:0;background:#0e0e10}
  .legend{position:absolute;bottom:18px;left:18px;background:rgba(10,10,11,.86);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:12px;padding:12px 14px;z-index:400;max-width:240px}
  .legend h5{margin:0 0 8px;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-mute);font-weight:500}
  .legend-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text);margin:4px 0}
  .legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .scope-note{position:absolute;top:18px;left:18px;background:rgba(10,10,11,.86);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:999px;padding:7px 14px;font-size:11.5px;color:var(--text-dim);z-index:400}
  .scope-note b{color:var(--text);font-weight:500}

  /* custom markers */
  .marker{width:12px;height:12px;border-radius:50%;border:2px solid #0a0a0b;box-shadow:0 0 0 0 var(--ring);transition:box-shadow .25s, transform .2s}
  .marker:hover{transform:scale(1.35);box-shadow:0 0 0 6px var(--ring)}
  .marker.muted{opacity:.22}
  .marker.ring{box-shadow:0 0 0 2px rgba(184,148,255,.5),0 0 10px rgba(184,148,255,.4)}
  .marker.home{width:22px;height:22px;border-width:3px;border-color:var(--accent);box-shadow:0 0 0 5px rgba(184,148,255,.2),0 0 18px rgba(184,148,255,.5)}

  /* detail panel */
  aside.detail{border-left:1px solid var(--border);overflow-y:auto;background:var(--bg);padding:0}
  .detail-inner{padding:20px 22px 32px}
  .detail-close{background:transparent;border:0;color:var(--text-dim);font-size:20px;line-height:1;padding:4px 8px;border-radius:6px;position:sticky;top:12px;float:right}
  .detail-close:hover{color:var(--text);background:var(--bg-elev)}
  .detail .kicker{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin:0 0 6px}
  .detail h2{margin:0 0 8px;font-size:22px;font-weight:500;letter-spacing:-.015em;line-height:1.2}
  .detail .sub{font-size:13px;color:var(--text-dim);margin:0 0 16px}
  .detail .hero-img{aspect-ratio:16/10;border-radius:12px;margin:14px 0;background:linear-gradient(135deg,#2a2a2f,#1b1b1f);display:flex;align-items:center;justify-content:center;color:var(--text-mute);font-size:12px;border:1px dashed #2f2f35}
  .detail dl{margin:0;display:grid;grid-template-columns:120px 1fr;gap:8px 16px;font-size:13px}
  .detail dt{color:var(--text-mute)}
  .detail dd{margin:0;color:var(--text)}
  .detail .status-badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11.5px;background:var(--bg-elev);border:1px solid var(--border)}
  .detail h3{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-mute);margin:22px 0 10px;font-weight:500}
  .detail p{margin:0 0 10px;color:var(--text);font-size:14px;line-height:1.6}
  .detail .cta{display:block;width:100%;text-align:center;padding:12px;background:var(--accent);color:#0a0a0b;border:0;border-radius:12px;font-weight:600;margin-top:16px;font-size:14px}
  .detail .cta.sec{background:transparent;color:var(--text);border:1px solid var(--border);font-weight:500;margin-top:8px}
  .detail .cta:hover{opacity:.9}
  .detail .cite{background:var(--bg-elev);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-family:"SF Mono",Menlo,monospace;font-size:11.5px;color:var(--text-dim);white-space:pre-wrap;word-break:break-word;margin-top:6px}
  .detail .badge-row{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 0}
  .detail .badge{font-size:11px;padding:3px 9px;border-radius:999px;background:var(--bg-elev);border:1px solid var(--border);color:var(--text-dim)}
  .detail .badge.ok{color:#9cc98a;border-color:#2f4a2d}
  .detail .badge.wait{color:#e3c574;border-color:#4a422d}

  /* leaflet overrides */
  .leaflet-container{background:#0e0e10;font:inherit}
  .leaflet-control-attribution{background:rgba(10,10,11,.7)!important;color:var(--text-mute)!important;font-size:10px}
  .leaflet-control-attribution a{color:var(--text-dim)!important}
  .leaflet-control-zoom{border:1px solid var(--border)!important;overflow:hidden;border-radius:10px!important;box-shadow:none!important}
  .leaflet-control-zoom a{background:var(--bg-elev)!important;color:var(--text)!important;border-color:var(--border)!important}
  .leaflet-control-zoom a:hover{background:var(--bg-elev-2)!important}

  /* small screen: stack */
  @media (max-width:900px){
    main{grid-template-columns:1fr!important}
    aside.sidebar{display:none}
    aside.detail{position:fixed;inset:auto 0 0 0;height:70vh;border-left:0;border-top:1px solid var(--border);z-index:600}
  }
</style>
</head>

<header>
  <div class="logo"><span class="dot"></span>map<em>me</em></div>

  <span class="phase" id="phase">MVP · Công chúng</span>

    <button class="persona-btn" data-persona="hung" aria-pressed="false">Bác Hùng · Artisan</button>
    <button class="persona-btn" data-persona="linh" aria-pressed="false">Linh · Designer</button>
    <button class="persona-btn" data-persona="thao" aria-pressed="false">Chị Thảo · Cán bộ</button>

<main id="main">

    <div class="legend" id="legend"></div>
  </div>
  <aside class="detail" id="detail"></aside>
</main>

<script>
const VILLAGES = JSON.parse(document.getElementById('data-json').textContent);

const FAMILIES = [
  {key:'Ẩm thực',       color:'var(--food)',    hex:'#e39a4b'},
  {key:'Tre nứa mây',   color:'var(--bamboo)',  hex:'#7fb069'},
  {key:'Dệt may',       color:'var(--textile)', hex:'#d46a9d'},
  {key:'Kim khí',       color:'var(--metal)',   hex:'#6aa7c2'},
  {key:'Mộc & đóng thuyền', color:'var(--wood)', hex:'#a37358'},
  {key:'Gốm sứ',        color:'var(--ceramic)', hex:'#c7704e'},
  {key:'Giấy & tranh',  color:'var(--paper)',   hex:'#5ec1c0'},
  {key:'Thủ công khác', color:'var(--other)',   hex:'#8a8790'},
];
const STATUSES = [
  {key:'Hoạt động',      color:'#7fb069', label:'Đang hoạt động'},
  {key:'Được công nhận', color:'#b894ff', label:'Di sản / CN'},
  {key:'Phục hồi',       color:'#e39a4b', label:'Đang phục hồi'},
  {key:'Đang mai một',   color:'#e06b6b', label:'Đang mai một'},
];
const famHex = Object.fromEntries(FAMILIES.map(f=>[f.key,f.hex]));
const stHex  = Object.fromEntries(STATUSES.map(s=>[s.key,s.color]));
const PROVINCES = [...new Set(VILLAGES.map(v=>v.province))].sort();

/* --- Featured artisan (editorial placeholder) --- */
const FEATURED = {
  name:'Bác Hùng',
  craft:'Rèn Phú Mỹ',
  villageId:'11',
  quote:'Bác làm dao từ năm 16 tuổi. Giờ 68 tuổi rồi, lò vẫn đỏ lửa mỗi sáng.',
  region:'An Giang · H. Phú Tân',
};

/* --- Simulated persona-only fields (for demo) --- */
function seed(n){let x=n*9301+49297;return ()=>{x=(x*9301+49297)%233280;return x/233280;}}
VILLAGES.forEach(v=>{
  const r = seed(Number(v.id)||1);
  v.docDensity = Math.floor(r()*4);   // Minh: 0–3
  v.materialAvail = r() > 0.45;        // Linh
  v.acceptingOrders = r() > 0.6;       // Linh
});

/* --- Map init --- */
const map = L.map('map',{zoomControl:true,worldCopyJump:true}).setView([16.2,107.5],6);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',{
  subdomains:'abcd', maxZoom:19,
  attribution:'&copy; OpenStreetMap contributors · &copy; CARTO'
}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png',{
  subdomains:'abcd', maxZoom:19, pane:'shadowPane'
}).addTo(map);

/* --- State --- */
let persona = 'public';
let activeFamilies = new Set(FAMILIES.map(f=>f.key));
let activeStatuses = new Set(STATUSES.map(s=>s.key));
let activeProvince = 'all';
let searchText = '';
let markers = {};

/* --- Build markers --- */
function buildMarkers(){
  Object.values(markers).forEach(m=>m.remove());
  markers = {};
  VILLAGES.forEach(v=>{
    const color = persona==='thao' ? stHex[v.status] : famHex[v.family];
    const isHome = persona==='hung' && v.id===FEATURED.villageId;
    const ringed = persona==='minh' && v.docDensity===0;
    const el = document.createElement('div');
    el.className = 'marker'+(isHome?' home':'')+(ringed?' ring':'');
    el.style.background = color;
    const icon = L.divIcon({className:'',html:el.outerHTML,iconSize:[12,12],iconAnchor:[6,6]});
    const m = L.marker([v.lat,v.lng],{icon}).on('click',()=>openDetail(v));
    markers[v.id] = m;
  });
  applyFilters();
}

/* --- Filters --- */
function applyFilters(){
  let visible = 0;
  VILLAGES.forEach(v=>{
    const m = markers[v.id]; if(!m) return;
    const famOk = persona==='thao' ? activeStatuses.has(v.status) : activeFamilies.has(v.family);
    const provOk = activeProvince==='all' || v.province===activeProvince;
    const textOk = !searchText ||
      v.name.toLowerCase().includes(searchText) ||
      v.product.toLowerCase().includes(searchText) ||
      v.province.toLowerCase().includes(searchText) ||
      v.location.toLowerCase().includes(searchText);
    const hungRadius = persona!=='hung' ||
      (Math.abs(v.lat - 10.65) < 1.2 && Math.abs(v.lng - 105.38) < 1.2);
    const show = famOk && provOk && textOk && hungRadius;
    if(show){ m.addTo(map); visible++; } else { m.remove(); }
  });
  document.getElementById('countVisible').textContent = visible;
}

/* --- Sidebar rendering per persona --- */
function renderSidebar(){
  const s = document.getElementById('sidebar');
  const notes = {
    public:'<strong>MVP · Công chúng.</strong> Khám phá làng nghề thủ công Việt Nam. Không cần đăng nhập. Nhấp vào một điểm để đọc câu chuyện.',
    minh:'<strong>V2 · Minh.</strong> Vòng sáng quanh điểm = chưa được tư liệu hóa. Hữu ích cho ưu tiên nghiên cứu. Có thể xuất trích dẫn.',
    hung:'<strong>V2 · Bác Hùng.</strong> Giao diện đơn giản, chữ lớn. Chỉ hiển thị làng của tôi và các làng lân cận. Ba nút lớn để đăng tải.',
    linh:'<strong>V2 · Linh.</strong> Bộ lọc theo nguyên liệu & nghệ nhân nhận đặt hàng. Lưu làng vào dự án đang làm.',
    thao:'<strong>V2 · Chị Thảo.</strong> Màu theo trạng thái hoạt động. Bảng điều khiển quận/huyện. Xem nhanh nơi cần can thiệp.',
  };
  let html = `<div class="persona-note">${notes[persona]}</div>`;

  if(persona==='hung'){
    html += `
      <div class="section-label">Hôm nay bác muốn làm gì?</div>
      <div class="hung-actions">
        <button class="hung-btn"><span class="ico">📷</span><span><strong>Chia sẻ một tấm ảnh</strong><small>Công việc hôm nay</small></span></button>
        <button class="hung-btn"><span class="ico">🎤</span><span><strong>Kể một câu chuyện</strong><small>Ghi âm lại</small></span></button>
        <button class="hung-btn"><span class="ico">📦</span><span><strong>Đăng tin</strong><small>Nguyên liệu, sản phẩm, nhu cầu</small></span></button>
      </div>
      <div class="section-label">Làng của tôi</div>
      <button class="hung-btn" onclick="openDetail(VILLAGES.find(v=>v.id==='${FEATURED.villageId}'))">
        <span class="ico">🏠</span><span><strong>Rèn Phú Mỹ, An Giang</strong><small>Xem hồ sơ làng của tôi</small></span>
      </button>
    `;
    s.innerHTML = html; return;
  }

  // search
  html += `
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-4.35-4.35"/></svg>
      <input id="q" type="text" placeholder="Tìm làng nghề, sản phẩm, địa phương…" />
    </div>
  `;

  if(persona==='linh'){
    html += `
      <div class="project-card">
        <div class="label">Dự án đang thực hiện</div>
        <h4>Bộ sưu tập Xuân 2026</h4>
        <p>Tìm kiếm: tơ tằm, thổ cẩm tự nhiên, chiếu cói, gỗ tái sử dụng.</p>
      </div>
    `;
  }

  if(persona==='thao'){
    const counts = {};
    STATUSES.forEach(s=>counts[s.key]=VILLAGES.filter(v=>v.status===s.key).length);
    html += `
      <div class="stats-grid">
        <div class="stat-card"><div class="v">${counts['Hoạt động']}</div><div class="k">Đang hoạt động</div></div>
        <div class="stat-card"><div class="v">${counts['Được công nhận']}</div><div class="k">Được công nhận</div></div>
        <div class="stat-card"><div class="v">${counts['Phục hồi']||0}</div><div class="k">Đang phục hồi</div></div>
        <div class="stat-card alert"><div class="v">${counts['Đang mai một']||0}</div><div class="k">Đang mai một</div></div>
      </div>
      <div class="section-label">Lọc theo trạng thái</div>
      <div class="filter-chips" id="statusChips"></div>
    `;
  } else {
    html += `
      <div class="section-label">Nghề thủ công</div>
      <div class="filter-chips" id="famChips">
        <button class="chip all" data-family="__all__" aria-pressed="true">Tất cả</button>
      </div>
    `;
  }

  html += `
    <div class="section-label">Tỉnh thành</div>
    <select class="province" id="province">
      <option value="all">Tất cả (12)</option>
      ${PROVINCES.map(p=>`<option value="${p}">${p}</option>`).join('')}
    </select>
  `;

  if(persona==='minh'){
    html += `
      <div class="section-label">Bộ lọc nghiên cứu</div>
      <div class="filter-chips">
        <button class="chip" data-minh="undoc">Chưa được tư liệu hóa</button>
        <button class="chip" data-minh="oldest">Cổ xưa nhất</button>
      </div>
    `;
  }

  if(persona==='public'){
    html += `
      <div class="featured" onclick="openDetail(VILLAGES.find(v=>v.id==='${FEATURED.villageId}'))" style="cursor:pointer">
        <div class="meta">Nghệ nhân tuần này</div>
        <div class="hero"><span class="label">Ảnh · Bác Hùng bên lò rèn</span></div>
        <div class="body">
          <h3>${FEATURED.name} · ${FEATURED.craft}</h3>
          <p>"${FEATURED.quote}"</p>
          <span class="jump">Đọc câu chuyện →</span>
        </div>
      </div>
    `;
  }

  s.innerHTML = html;

  // bind
  const q = document.getElementById('q');
  if(q) q.addEventListener('input',e=>{searchText=e.target.value.trim().toLowerCase();applyFilters();});

  const provSel = document.getElementById('province');
  if(provSel) provSel.addEventListener('change',e=>{activeProvince=e.target.value;applyFilters();});

  const famWrap = document.getElementById('famChips');
  if(famWrap){
    FAMILIES.forEach(f=>{
      const b = document.createElement('button');
      b.className='chip'; b.dataset.family=f.key; b.setAttribute('aria-pressed','true');
      b.innerHTML = `<span class="dot" style="background:${f.hex}"></span>${f.key}`;
      famWrap.appendChild(b);
    });
    famWrap.addEventListener('click',e=>{
      const btn = e.target.closest('.chip'); if(!btn) return;
      const f = btn.dataset.family;
      if(f==='__all__'){
        activeFamilies = new Set(FAMILIES.map(x=>x.key));
        famWrap.querySelectorAll('.chip').forEach(c=>c.setAttribute('aria-pressed','true'));
      } else {
        if(activeFamilies.has(f)) activeFamilies.delete(f); else activeFamilies.add(f);
        btn.setAttribute('aria-pressed', activeFamilies.has(f)?'true':'false');
        const allBtn = famWrap.querySelector('.chip.all');
        allBtn.setAttribute('aria-pressed', activeFamilies.size===FAMILIES.length?'true':'false');
      }
      applyFilters();
    });
  }

  const stWrap = document.getElementById('statusChips');
  if(stWrap){
    STATUSES.forEach(s=>{
      const b = document.createElement('button');
      b.className='chip'; b.dataset.status=s.key; b.setAttribute('aria-pressed','true');
      b.innerHTML = `<span class="dot" style="background:${s.color}"></span>${s.label}`;
      stWrap.appendChild(b);
    });
    stWrap.addEventListener('click',e=>{
      const btn = e.target.closest('.chip'); if(!btn) return;
      const k = btn.dataset.status;
      if(activeStatuses.has(k)) activeStatuses.delete(k); else activeStatuses.add(k);
      btn.setAttribute('aria-pressed', activeStatuses.has(k)?'true':'false');
      applyFilters();
    });
  }
}

/* --- Legend --- */
function renderLegend(){
  const l = document.getElementById('legend');
  if(persona==='thao'){
    l.innerHTML = `<h5>Trạng thái làng nghề</h5>` +
      STATUSES.map(s=>`<div class="legend-row"><span class="legend-dot" style="background:${s.color}"></span>${s.label}</div>`).join('');
  } else {
    l.innerHTML = `<h5>Nghề thủ công</h5>` +
      FAMILIES.map(f=>`<div class="legend-row"><span class="legend-dot" style="background:${f.hex}"></span>${f.key}</div>`).join('');
    if(persona==='minh'){
      l.innerHTML += `<h5 style="margin-top:10px">Tư liệu hóa</h5>
        <div class="legend-row"><span class="legend-dot" style="background:transparent;box-shadow:0 0 0 2px rgba(184,148,255,.8)"></span>Chưa được tư liệu hóa</div>`;
    }
  }
}

/* --- Detail panel --- */
function openDetail(v){
  if(!v) return;
  const d = document.getElementById('detail');
  document.getElementById('main').classList.add('detail-open');

  const famColor = famHex[v.family];
  const statusColor = stHex[v.status]||'#888';

  let extras = '';
  if(persona==='public'){
    extras = `
      <h3>Câu chuyện</h3>
      <p>Làng ${v.name.toLowerCase().includes('rèn')?'rèn':'nghề'} ở ${v.location}, ${v.province}. Thành lập ${v.when.toLowerCase()}. ${v.family==='Kim khí'?'Thế hệ thợ trẻ đang tiếp nối.':''}</p>
      <p style="color:var(--text-mute);font-size:12.5px;font-style:italic">Câu chuyện đầy đủ sẽ được biên tập bởi đội ngũ mapme. Đây là mô tả tóm tắt.</p>
      ${v.id==='11' ? '<a class="cta" href="village-ren-phu-my.html" target="_blank" rel="noopener" style="text-decoration:none;display:block;box-sizing:border-box">Xem hồ sơ đầy đủ →</a>' : ''}
      <button class="cta${v.id==='11'?' sec':''}">Liên hệ về làng nghề này</button>
      <button class="cta sec">Chia sẻ liên kết</button>
    `;
  }
  if(persona==='minh'){
    const level = ['Chưa có','Sơ sài','Trung bình','Đầy đủ'][v.docDensity];
    extras = `
      <h3>Thông tin nghiên cứu</h3>
      <dl>
        <dt>Mức tư liệu hóa</dt><dd>${level}</dd>
        <dt>Thời kỳ</dt><dd>${v.when}</dd>
        <dt>Tọa độ</dt><dd>${v.lat}, ${v.lng}</dd>
      </dl>
      <h3>Trích dẫn</h3>
      <div class="cite">mapme (2026). "${v.name}", ${v.location}, ${v.province}. Retrieved from mapme.vn/v/${v.id}</div>
      <button class="cta">Xuất BibTeX / APA</button>
      <button class="cta sec">Thêm vào dự án điền dã</button>
    `;
  }
  if(persona==='hung'){
    extras = `
      <h3>Hành động</h3>
      <button class="cta" style="font-size:16px;padding:16px">📷 Đăng ảnh mới</button>
      <button class="cta sec" style="font-size:15px;padding:14px">🎤 Gửi tin nhắn thoại</button>
      <button class="cta sec" style="font-size:15px;padding:14px">📞 Gọi người giúp</button>
    `;
  }
  if(persona==='linh'){
    extras = `
      <h3>Khả năng cung cấp</h3>
      <div class="badge-row">
        ${v.materialAvail?'<span class="badge ok">✓ Còn nguyên liệu</span>':'<span class="badge wait">Hết mùa</span>'}
        ${v.acceptingOrders?'<span class="badge ok">✓ Nhận đặt hàng</span>':'<span class="badge wait">Chưa nhận đặt</span>'}
        <span class="badge">✓ Đã xác minh</span>
      </div>
      <h3>Gắn với dự án</h3>
      <p style="color:var(--text-dim);font-size:13px">Dự án đang thực hiện: <strong style="color:var(--text)">Bộ sưu tập Xuân 2026</strong></p>
      <button class="cta">Thêm vào brief dự án</button>
      <button class="cta sec">Lưu vào moodboard</button>
    `;
  }
  if(persona==='thao'){
    extras = `
      <h3>Hành chính</h3>
      <dl>
        <dt>Trạng thái</dt><dd><span class="status-badge" style="border-color:${statusColor};color:${statusColor}">${v.status}</span></dd>
        <dt>Lần cập nhật</dt><dd>26/03/2026</dd>
        <dt>Cán bộ phụ trách</dt><dd>—</dd>
      </dl>
      <button class="cta">Xác thực hồ sơ</button>
      <button class="cta sec">Gắn cờ để xem xét</button>
      <button class="cta sec">Xuất báo cáo làng</button>
    `;
  }

  d.innerHTML = `
    <div class="detail-inner">
      <button class="detail-close" onclick="closeDetail()">×</button>
      <p class="kicker" style="color:${famColor}">${v.family}</p>
      <h2>${v.name}</h2>
      <p class="sub">${v.location} · ${v.province}</p>
      <div class="hero-img">Ảnh làng nghề (placeholder)</div>
      <dl>
        <dt>Sản phẩm</dt><dd>${v.product}</dd>
        <dt>Thời kỳ</dt><dd>${v.when}</dd>
        <dt>Trạng thái</dt><dd><span class="status-badge" style="border-color:${statusColor};color:${statusColor}">${v.status}</span></dd>
      </dl>
      ${extras}
    </div>
  `;
  map.flyTo([v.lat,v.lng],9,{duration:.6});
}
function closeDetail(){
  document.getElementById('main').classList.remove('detail-open');
}

/* --- Persona switching --- */
document.querySelectorAll('.persona-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.persona-btn').forEach(b=>b.setAttribute('aria-pressed','false'));
    btn.setAttribute('aria-pressed','true');
    persona = btn.dataset.persona;
    document.body.setAttribute('data-persona',persona);
    const label = {public:'MVP · Công chúng',minh:'V2 · Nghiên cứu',hung:'V2 · Nghệ nhân',linh:'V2 · Thiết kế',thao:'V2 · Quản lý di sản'}[persona];
    document.getElementById('phase').textContent = label;
    closeDetail();
    renderSidebar();
    renderLegend();
    buildMarkers();
    // Hung view: zoom to his village
    if(persona==='hung'){
      const v = VILLAGES.find(x=>x.id===FEATURED.villageId);
      if(v) map.flyTo([v.lat,v.lng],8,{duration:.8});
    } else {
      map.flyTo([16.2,107.5],6,{duration:.8});
    }
  });
});

/* --- Init --- */
renderSidebar();
renderLegend();
buildMarkers();
</script>
</body>
</html>
